version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ventahub-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ventahub_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ventahub_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ventahub_db}
    ports:
      - "5432:5432"
    volumes:
      - ventahub-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ventahub_user} -d ${POSTGRES_DB:-ventahub_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ventahub-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ventahub-redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ventahub-pg-data:
  ventahub-redis-data:
